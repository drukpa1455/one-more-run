version: "2.0"

endpoints:
  pomerium:
    kind: ip

services:
  worker:
    image: ghcr.io/drukpa1455/one-more-run-worker@sha256:0f0f0369a0e7f86c46362ec33d750320cfd4f2cbdedddcde9ae00efc0f2db9d8
    expose:
      - port: 8080
        to:
          - service: pomerium
  pomerium:
    image: pomerium/pomerium@sha256:e10d1d267af24f581157f485d9b0bc08469e2428675b696a08e42ceb09b2279c
    expose:
      - port: 443
        as: 443
        to:
          - global: true
            ip: pomerium

profiles:
  compute:
    worker:
      resources:
        cpu:
          units: 4
        memory:
          size: 8Gi
        storage:
          - size: 16Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: rtx3090
                - model: rtx6000
                - model: v100
                - model: t4
    pomerium:
      resources:
        cpu:
          units: 1
        memory:
          size: 1Gi
        storage:
          - size: 1Gi
  placement:
    akash:
      pricing:
        worker:
          denom: uact
          amount: 1000
        pomerium:
          denom: uact
          amount: 1000

deployment:
  worker:
    akash:
      profile: worker
      count: 1
  pomerium:
    akash:
      profile: pomerium
      count: 1
